{% extends "base.html" %}
{% block content %}
  <div class="container">
    <!-- Cabeçalho -->
    <section class="p-5 mb-4 theme-card rounded-3 shadow-sm">
      <h2 class="fw-bold theme-text">
        <i class="fa-solid fa-sliders me-2"></i>
        Preferências
      </h2>
      <p class="theme-muted mb-0">
        Personalize sua experiência de uso do Arsenal.
      </p>
    </section>
    <div class="row g-4">
      <!-- Aparência -->
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm p-4 h-100">
          <h4 class="fw-bold mb-4">
            <i class="fa-solid fa-palette me-2 text-primary"></i>
            Aparência
          </h4>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="darkModeSwitch">
            <label class="form-check-label" for="darkModeSwitch">
                Tema escuro
            </label>
          </div>
        </div>
      </div>
      <!-- Notificações -->
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm p-4 h-100">
          <h4 class="fw-bold mb-4">
            <i class="fa-solid fa-bell me-2 text-warning"></i>
            Notificações
          </h4>
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="email">
            <label class="form-check-label" for="email">
            Receber notificações por e-mail
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="sistema">
            <label class="form-check-label" for="sistema">
            Receber notificações no sistema
            </label>
          </div>
        </div>
      </div>
      <!-- Processos -->
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm p-4 h-100">
          <h4 class="fw-bold mb-4">
            <i class="fa-solid fa-folder-open me-2 text-success"></i>
            Processos
          </h4>
          <label class="form-label">
          Processos por página
          </label>
          <select class="form-select">
            <option>10</option>
            <option>20</option>
            <option>50</option>
          </select>
        </div>
      </div>
      <!-- Inteligência Artificial -->
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm p-4 h-100">
          <h4 class="fw-bold mb-4">
            <i class="fa-solid fa-robot me-2 text-danger"></i>
            Inteligência Artificial
          </h4>
          <label class="form-label">
          Modelo padrão
          </label>
          <select class="form-select">
            <option>GPT-5.5</option>
            <option>GPT-5.5 Mini</option>
          </select>
        </div>
      </div>
    </div>
    <div class="text-end mt-4">
      <button class="btn btn-primary">
      <i class="fa-solid fa-floppy-disk me-2"></i>
      Salvar preferências
      </button>
    </div>
  </div>
{% endblock %}
