        <!-- Header Mobile -->
        <header
          class="mobile-header d-lg-none d-flex align-items-center justify-content-between p-3">
          <button id="mobileMenuBtn" class="btn btn-primary">
            <i class="fa-solid fa-bars"></i>
          </button>
        </header>
        <!-- Sidebar -->
        <aside
          class="sidebar col-lg-2 d-flex flex-column justify-content-between p-3 text-white">
          <button
            class="close-menu btn btn-link text-white d-lg-none align-self-end mb-3">
            <i class="fa-solid fa-xmark fa-xl"></i>
          </button>
          <div>
            <!-- Logo -->
            <div class="logo mb-4">
              <h2 class="h4 mb-0 fw-bold">Arsenal</h2>
              <span class="text-muted small"> Depurador de Orçamentos </span>
            </div>
            <!-- Navegação -->
            {% with pagina=request.resolver_match.url_name %}
              <nav class="nav nav-pills flex-column gap-1">
                <a class="nav-link {% if pagina == 'home' %} active {% endif %}" href="{% url 'home' %}">
                  <i class="fa-solid fa-house fa-fw me-2"></i>
                  <span>Início</span>
                </a>
                <a class="nav-link {% if pagina == 'dashboard' %} active {% endif %}" href="{% url 'dashboard' %}">
                  <i class="fa-solid fa-clipboard fa-fw me-2"></i>
                  <span>Dashboard</span>
                </a>
                <!-- Processos -->
                <a class="nav-link {% if pagina == 'processos' %}active{% endif %}
                                   {% if pagina == 'novo_processo' %}active{% endif %}
                                   {% if pagina == 'documentos' %}active{% endif %}
                                   {% if pagina == 'mapas_gerados' %}active{% endif %}
                                   d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#submenuProcessos" role="button" aria-expanded="false" aria-controls="submenuProcessos">
                  <span>
                    <i class="fa-solid fa-folder-open fa-fw me-2"></i>
                    Processos
                  </span>
                  <i class="fa-solid fa-chevron-down small seta-submenu"></i>
                </a>
                <div class="collapse" id="submenuProcessos">
                  <div class="nav flex-column ms-3 ps-2 border-start border-secondary border-opacity-25">
                    <a class="nav-link {% if pagina == 'processos' %} active {% endif %} py-2 text-white-50 small d-flex align-items-center" href="{% url 'processos' %}">
                      <i class="fa-solid fa-folder-open fa-fw me-2"></i>
                      <span>Ver Processos</span>
                    </a>
                    <a class="nav-link {% if pagina == 'novo_processo' %} active {% endif %} py-2 text-white-50 small d-flex align-items-center" href="{% url 'novo_processo' %}">
                      <i class="fa-solid fa-file-circle-plus fa-fw me-2"></i>
                      <span>Novo Processo</span>
                    </a>
                    <a class="nav-link {% if pagina == 'documentos' %} active {% endif %} py-2 text-white-50 small d-flex align-items-center" href="{% url 'documentos' %}">
                      <i class="fa-solid fa-file-lines fa-fw me-2"></i>
                      <span>Documentos</span>
                    </a>
                    <a
                      class="nav-link {% if pagina == 'mapas_gerados' %} active {% endif %}py-2 text-white-50 small d-flex align-items-center"
                      href="{% url 'mapas_gerados' %}">
                      <i class="fa-solid fa-file-circle-check fa-fw me-2"></i>
                      <span>Mapas Gerados</span>
                    </a>
                  </div>
                </div>
                <a class="nav-link {% if pagina == 'mapa' %} active {% endif %}d-flex align-items-center" href="{% url 'mapa' %}">
                  <i class="fa-solid fa-scale-balanced fa-fw me-2"></i>
                  <span>Modelo de Mapa<br />Comparativo</span>
                </a>
                <a class="nav-link {% if pagina == 'configuracoes' %} active {% endif %} d-flex align-items-center" href="{% url 'configuracoes' %}">
                  <i class="fa-solid fa-gear fa-fw me-2"></i>
                  <span>Configurações</span>
                </a>
              </nav>
            {% endwith %}
          </div>
          <!-- Perfil -->
          <div class="perfil d-flex align-items-center gap-2 pt-3 mt-4 border-top border-secondary">
            <img src="https://placehold.co/40x40" class="rounded-circle" alt="Administrador"/>
            <div class="overflow-hidden">
              <strong class="d-block text-truncate small">
                Administrador
              </strong>
              <small class="text-muted d-block text-truncate">
                admin@teste.com
              </small>
            </div>
          </div>
        </aside>
        <div class="sidebar-backdrop"></div>
